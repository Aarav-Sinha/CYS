<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — Critically Yours</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#090d07;--bg2:#0f160b;--bg3:#141e0e;--gold:#c9a84c;--gold2:#e8c97a;--green:#4a7c2f;--green2:#6aab3a;--green3:#2d5016;--surface:#111a0d;--surface2:#182315;--border:rgba(106,171,58,0.22);--border2:rgba(201,168,76,0.2);--text:#e0ead4;--text2:#a8be90;--text3:#6a8a54;--red:#c0392b;--red-bg:rgba(192,57,43,0.1);--sidebar:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;display:flex;flex-direction:column}

/* LOADING SCREEN */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem}
.load-logo{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;font-style:italic;color:var(--gold);animation:pulse 1.5s ease-in-out infinite}
.load-sub{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text3)}
.load-bar-wrap{width:180px;height:2px;background:var(--border);overflow:hidden}
.load-bar{height:100%;background:linear-gradient(to right,var(--green3),var(--green2));animation:loadBar 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes loadBar{
  0% { width: 0%; transform: translateX(0); }
  70% { width: 100%; }
  100% { width: 100%; transform: translateX(100%); }
}

/* LAYOUT */
#appShell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100;overflow-y:auto;transition:transform 0.3s}
.sidebar-brand{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:0.6rem}
.sidebar-logo img{height:32px;width:32px;border-radius:50%;border:1px solid var(--border2);object-fit:contain}
.sidebar-logo-text{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:900;font-style:italic;color:var(--gold);line-height:1}
.sidebar-logo-sub{font-family:'Monotype Corsiva',cursive;font-size:0.62rem;color:var(--text3);display:block;margin-top:2px}
.sidebar-user{padding:1rem 1.2rem;border-bottom:1px solid var(--border);flex-shrink:0}
.user-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--border);display:block;margin-bottom:0.5rem}
.user-name{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role-badge{display:inline-block;margin-top:0.3rem;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.2rem 0.5rem;border-radius:2px;border:1px solid}
.role-admin{color:#ff9f43;border-color:rgba(255,159,67,0.3);background:rgba(255,159,67,0.08)}
.role-core{color:var(--gold);border-color:var(--border2);background:rgba(201,168,76,0.07)}
.role-teacher{color:#a29bfe;border-color:rgba(162,155,254,0.3);background:rgba(162,155,254,0.07)}
.role-event_head{color:var(--green2);border-color:var(--border);background:rgba(106,171,58,0.07)}
.role-volunteer_head{color:#fd79a8;border-color:rgba(253,121,168,0.3);background:rgba(253,121,168,0.07)}
.role-management{color:#74b9ff;border-color:rgba(116,185,255,0.3);background:rgba(116,185,255,0.07)}
.role-volunteer{color:var(--text2);border-color:var(--border);background:transparent}
.role-participant{color:var(--text3);border-color:var(--border);background:transparent}
.role-pending{color:var(--red);border-color:rgba(192,57,43,0.3);background:var(--red-bg)}

.sidebar-nav{flex:1;padding:0.8rem 0}
.nav-section-label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text3);padding:0.6rem 1.2rem 0.3rem;margin-top:0.5rem}
.nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.2rem;cursor:pointer;transition:all 0.25s;font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);border-left:2px solid transparent;text-decoration:none;position:relative}
.nav-item:hover{color:var(--text2);background:rgba(106,171,58,0.05)}
.nav-item.active{color:var(--green2);border-left-color:var(--green2);background:rgba(106,171,58,0.08)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.nav-badge{position:absolute;right:0.8rem;background:var(--green3);color:var(--green2);font-size:0.55rem;padding:0.1rem 0.4rem;border-radius:10px;border:1px solid var(--border)}

.sidebar-bottom{padding:0.8rem 1.2rem;border-top:1px solid var(--border);flex-shrink:0}
.sign-out-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--text3);padding:0.6rem 1rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.3s;text-align:center}
.sign-out-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;font-style:italic;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.notif-btn{position:relative;background:none;border:1px solid var(--border);color:var(--text3);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.notif-btn:hover{border-color:var(--green2);color:var(--green2)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--gold);border-radius:50%;display:none}
.notif-dot.show{display:block}
.hamburger-main{display:none;background:none;border:1px solid var(--border);color:var(--text3);width:36px;height:36px;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:8px}
.hamburger-main span{width:16px;height:1.5px;background:currentColor;display:block}
.content{flex:1;padding:2rem;overflow-y:auto}

/* PANELS */
.panel{display:none}
.panel.active{display:block}

/* CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:1.2rem;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.stat-card.green::after{background:linear-gradient(to right,var(--green3),var(--green2))}
.stat-card.gold::after{background:linear-gradient(to right,var(--gold3),var(--gold))}
.sc-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--text);line-height:1;margin-bottom:0.2rem}
.sc-label{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3)}

/* TABLES */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:0}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th{background:var(--surface2);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);padding:0.7rem 1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:0.75rem 1rem;border-bottom:1px solid rgba(106,171,58,0.1);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(106,171,58,0.03)}
.td-mono{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text3)}
.td-name{font-weight:600;color:var(--text)}
.badge{display:inline-block;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.5rem;border-radius:2px;border:1px solid}
.badge-green{color:var(--green2);border-color:var(--border);background:rgba(106,171,58,0.08)}
.badge-gold{color:var(--gold);border-color:var(--border2);background:rgba(201,168,76,0.07)}
.badge-red{color:#e07060;border-color:rgba(192,57,43,0.3);background:var(--red-bg)}
.badge-grey{color:var(--text3);border-color:var(--border);background:transparent}
.badge-purple{color:#a29bfe;border-color:rgba(162,155,254,0.3);background:rgba(162,155,254,0.07)}

/* SECTION HEADINGS */
.section-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.2rem}
.section-head h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;font-style:italic;color:var(--text)}
.btn-sm{background:var(--green3);border:1px solid var(--green2);color:var(--text);padding:0.5rem 1.1rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.3s}
.btn-sm:hover{background:var(--green2);color:var(--bg)}
.btn-sm-gold{background:rgba(201,168,76,0.1);border:1px solid var(--border2);color:var(--gold)}
.btn-sm-gold:hover{background:var(--gold);color:var(--bg)}
.btn-sm-red{background:var(--red-bg);border:1px solid rgba(192,57,43,0.3);color:#e07060}
.btn-sm-red:hover{background:rgba(192,57,43,0.25)}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text3);transition:color 0.3s;padding:0.25rem;line-height:1}
.btn-icon:hover{color:var(--green2)}
.btn-icon.del:hover{color:#e07060}

/* FORMS (inline) */
.form-row{display:flex;flex-wrap:wrap;gap:0.8rem;align-items:flex-end}
.fi{display:flex;flex-direction:column;gap:0.3rem}
.fi label{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3)}
.fi input,.fi select,.fi textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.8rem;font-family:'Cormorant Garamond',serif;font-size:0.95rem;outline:none;transition:border-color 0.3s;min-width:140px;border-radius:0}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--green2)}
.fi textarea{resize:vertical;min-height:80px;min-width:280px}
.fi input::placeholder,.fi textarea::placeholder{color:var(--text3);opacity:0.5}
select option{background:var(--bg2)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(9,13,7,0.9);z-index:500;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:560px;position:relative;margin:auto;animation:slideUp 0.35s ease}
.modal-top{height:3px;background:linear-gradient(to right,var(--green3),var(--gold),var(--green3))}
.modal-hd{padding:1.5rem 1.8rem 1rem;border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;font-style:italic;color:var(--text)}
.modal-bd{padding:1.5rem 1.8rem}
.modal-ft{padding:1rem 1.8rem 1.5rem;display:flex;gap:0.8rem;border-top:1px solid var(--border)}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;transition:color 0.3s}
.modal-close:hover{color:var(--text)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 130px);min-height:400px;border:1px solid var(--border);overflow:hidden}
.chat-sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-sidebar-hd{padding:1rem;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:0.9rem 1rem;cursor:pointer;transition:background 0.2s;border-bottom:1px solid rgba(106,171,58,0.08);position:relative}
.chat-item:hover{background:rgba(106,171,58,0.05)}
.chat-item.active{background:rgba(106,171,58,0.1);border-left:2px solid var(--green2)}
.chat-item-name{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item-preview{font-size:0.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:0.2rem}
.chat-item-time{position:absolute;top:0.9rem;right:0.8rem;font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text3)}
.chat-unread{position:absolute;bottom:0.8rem;right:0.8rem;background:var(--green3);color:var(--green2);font-family:'DM Mono',monospace;font-size:0.55rem;padding:0.1rem 0.35rem;border-radius:10px;border:1px solid var(--border)}
.chat-main{display:flex;flex-direction:column;overflow:hidden}
.chat-hd{padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.chat-hd-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;font-style:italic;color:var(--text)}
.chat-hd-sub{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.chat-msgs{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:0.8rem}
.msg-wrap{display:flex;flex-direction:column;max-width:70%;gap:0.2rem}
.msg-wrap.me{align-self:flex-end;align-items:flex-end}
.msg-wrap.them{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:0.6rem 0.9rem;border-radius:2px;font-size:0.95rem;line-height:1.6;word-break:break-word}
.msg-wrap.me .msg-bubble{background:var(--green3);color:var(--text);border:1px solid var(--border)}
.msg-wrap.them .msg-bubble{background:var(--surface2);color:var(--text2);border:1px solid rgba(106,171,58,0.12)}
.msg-meta{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--text3);display:flex;align-items:center;gap:0.4rem}
.msg-sender{color:var(--green2);font-weight:500}
.msg-status{font-size:0.6rem}
.msg-mention{color:var(--gold);font-weight:600}
.chat-input-area{padding:0.8rem 1rem;border-top:1px solid var(--border);display:flex;gap:0.6rem;align-items:flex-end;background:var(--bg2)}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.7rem 1rem;font-family:'Cormorant Garamond',serif;font-size:0.95rem;outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color 0.3s;border-radius:0}
.chat-input:focus{border-color:var(--green2)}
.send-btn{background:var(--green3);border:1px solid var(--green2);color:var(--green2);padding:0.6rem 1.1rem;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.3s;white-space:nowrap;align-self:flex-end}
.send-btn:hover{background:var(--green2);color:var(--bg)}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;color:var(--text3)}
.chat-empty span{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase}
.no-chat{text-align:center;padding:3rem;color:var(--text3);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase}

/* ANNOUNCEMENTS */
.announce-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green2);padding:1.2rem 1.5rem;margin-bottom:0.8rem}
.announce-card.urgent{border-left-color:var(--gold)}
.ann-meta{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.5rem;flex-wrap:wrap}
.ann-tag{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.15rem 0.5rem;border-radius:2px;border:1px solid}
.ann-tag.gen{color:var(--green2);border-color:var(--border);background:rgba(106,171,58,0.07)}
.ann-tag.urg{color:var(--gold);border-color:var(--border2);background:rgba(201,168,76,0.07)}
.ann-date{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text3)}
.ann-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:0.3rem}
.ann-body{font-size:0.9rem;color:var(--text2);line-height:1.7}
.ann-author{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text3);margin-top:0.5rem}
.ann-actions{display:flex;gap:0.4rem;margin-top:0.8rem}

/* PENDING/EMPTY */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-state .es-icon{font-size:2rem;margin-bottom:0.8rem;opacity:0.4}
.empty-state p{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase}

/* ERROR MSG */
.err-bar{background:var(--red-bg);border:1px solid rgba(192,57,43,0.3);color:#e07060;padding:0.7rem 1rem;font-family:'DM Mono',monospace;font-size:0.7rem;margin-bottom:1rem;display:none}
.err-bar.show{display:block}
.ok-bar{background:rgba(74,124,47,0.12);border:1px solid var(--border);color:var(--green2);padding:0.7rem 1rem;font-family:'DM Mono',monospace;font-size:0.7rem;margin-bottom:1rem;display:none}
.ok-bar.show{display:block}

/* PENDING ACCESS */
.pending-screen{padding:3rem 2rem;text-align:center;max-width:480px;margin:4rem auto}
.pending-icon{font-size:3rem;margin-bottom:1rem;opacity:0.5}
.pending-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;font-style:italic;color:var(--text);margin-bottom:0.7rem}
.pending-text{font-size:1rem;color:var(--text3);line-height:1.8}

/* MOBILE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger-main{display:flex}
  .chat-layout{grid-template-columns:1fr;height:auto}
  .chat-sidebar{height:250px}
  .chat-main{height:400px}
  .stat-row{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .content{padding:1rem}
  .topbar{padding:0.8rem 1rem}
  .form-row{flex-direction:column}
  .stat-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="load-logo">CY</div>
  <div class="load-sub">Critically Yours Portal</div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
</div>

<div id="appShell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <img src="cys_logo.png" alt="CY" onerror="this.style.display='none'"/>
        <div>
          <div class="sidebar-logo-text">Critically Yours</div>
          <span class="sidebar-logo-sub">DPS Megacity, Kolkata</span>
        </div>
      </div>
    </div>
    <div class="sidebar-user">
      <img class="user-avatar" id="sideAvatar" src="" alt=""/>
      <div class="user-name" id="sideName">Loading...</div>
      <span class="user-role-badge" id="sideRole">—</span>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-bottom">
      <button class="sign-out-btn" onclick="doSignOut()">Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="hamburger-main" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="showPanel('announcements')" title="Announcements">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notif-dot" id="notifDot"></div>
        </button>
        <img class="user-avatar" id="topAvatar" src="" alt="" style="margin:0;cursor:pointer" onclick="showPanel('profile')"/>

function fmt(ts){
  if(!ts)return'';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const now=new Date();
  const diff=now-d;
  if(diff<60000)return'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

    html+='</tr></thead><tbody>';
    let i=1;
    for(const d of snap.docs){
      const ev=d.data();

async function loadAnnouncements(){
  const el=document.getElementById('annList');if(!el)return;
  const r=ME?.role;
  try{
    // Participants see only public & their event announcements
    let snap;
    if(['admin','core','teacher'].includes(r)){
      snap=await getDocs(query(collection(db,'announcements'),orderBy('createdAt','desc')));
    } else if(['event_head','volunteer_head'].includes(r)){
      snap=await getDocs(query(collection(db,'announcements'),orderBy('createdAt','desc')));
    } else {
      snap=await getDocs(query(collection(db,'announcements'),where('public','==',true),orderBy('createdAt','desc')));
    }
    if(snap.empty){el.innerHTML='<div class="empty-state"><div class="es-icon">📢</div><p>No announcements yet.</p></div>';return;}
    const canEdit=['admin','core','teacher'].includes(r)||r==='event_head'||r==='volunteer_head';
    el.innerHTML=snap.docs.map(d=>{
      const a=d.data();
      const ts=a.createdAt?fmt(a.createdAt):'';
      const isOwn=a.authorUid===ME?.uid||['admin','core','teacher'].includes(r);
      return`<div class="announce-card${a.urgent?' urgent':''}">
        <div class="ann-meta"><span class="ann-tag ${a.urgent?'urg':'gen'}">${a.urgent?'Urgent':'General'}</span><span class="ann-tag gen">${a.audience||'All'}</span><span class="ann-date">${ts}</span></div>
        <div class="ann-title">${a.title||''}</div>
        <div class="ann-body">${a.body||''}</div>
        <div class="ann-author">— ${a.authorName||'Team'}</div>
        ${isOwn&&canEdit?`<div class="ann-actions"><button class="btn-sm btn-sm-red" onclick="deleteAnnounce('${d.id}')">Delete</button></div>`:''}
      </div>`;
    }).join('');
  }catch(e){if(el)el.innerHTML=`<div class="err-bar show">${e.message}</div>`;}
}

window.saveUserRole = async function(uid) {
  const newRole = document.getElementById('editUserRole').value;
  try {
    const userRef = doc(db, "users", uid);
    await updateDoc(userRef, { role: newRole });
    
    closeModal();
    renderUsers(); // Refresh structural components
    
    // Optional status confirmation banner toast
    const okBar = document.getElementById('users-ok');
    if(okBar) {
      okBar.textContent = "User permissions modified successfully.";

  } catch (e) {

function renderUserTable(users){

  el.innerHTML=html;
}

async function loadPerms(){
  const el=document.getElementById('permList');if(!el)return;
  try{
    const snap=await getDocs(collection(db,'chatPermissions'));
    if(snap.empty){el.innerHTML='<div class="empty-state"><div class="es-icon">🔒</div><p>No custom rules. Default: All roles can message Core, Teacher, and Admin.</p></div>';return;}
    let html='<div class="table-wrap"><table><thead><tr><th>From Role</th><th>Can Message</th><th>Actions</th></tr></thead><tbody>';
    snap.forEach(d=>{
      const r=d.data();
      html+=`<tr><td><span class="badge badge-green">${ROLE_LABELS[r.fromRole]||r.fromRole}</span></td><td>${(r.toRoles||[]).map(x=>`<span class="badge badge-grey" style="margin-right:4px">${ROLE_LABELS[x]||x}</span>`).join('')}</td><td><button class="btn-icon del" onclick="deletePerm('${d.id}')">🗑️</button></td></tr>`;
    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
  }catch(e){if(el)el.innerHTML=`<div class="err-bar show">${e.message}</div>`;}
}

window.openAddPerm=function(){
  const roles=Object.entries(ROLE_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  openModal('Add Chat Permission Rule',`
  <div class="fi" style="margin-bottom:0.8rem"><label>From Role</label><select id="p_from" class="form-input" style="-webkit-appearance:auto">${roles}</select></div>
  <div class="fi" style="margin-bottom:0.8rem"><label>Can Message (select multiple)</label><select id="p_to" class="form-input" multiple style="height:160px">${roles}</select></div>
  <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text3);margin-top:0.3rem">Hold Ctrl/Cmd to select multiple</div>
  <div class="err-bar" id="pErr"></div>`,
  `<button class="btn-sm btn-sm-gold" onclick="savePerm()">Save Rule</button><button class="btn-sm" onclick="closeModal()">Cancel</button>`);
};

window.savePerm=async function(){
  const from=document.getElementById('p_from').value;
  const toSel=document.getElementById('p_to');
  const toRoles=Array.from(toSel.selectedOptions).map(o=>o.value);
  if(!from||!toRoles.length){document.getElementById('pErr').textContent='Select from-role and at least one to-role.';document.getElementById('pErr').classList.add('show');return;}
  try{
    await addDoc(collection(db,'chatPermissions'),{fromRole:from,toRoles,createdAt:serverTimestamp()});
    closeModal();loadPerms();
  }catch(e){document.getElementById('pErr').textContent=e.message;document.getElementById('pErr').classList.add('show');}
};

window.deletePerm=async function(id){
  if(!confirm('Delete this rule?'))return;
  try{await deleteDoc(doc(db,'chatPermissions',id));loadPerms();}catch(e){alert(e.message);}
};

  const canCreate=['admin','core','teacher','event_head','volunteer_head'].includes(r);
  p.innerHTML=`

async function loadGroups(){
  const el=document.getElementById('groupList');if(!el)return;
  try{
    const snap=await getDocs(query(collection(db,'groups'),orderBy('createdAt','desc')));
    if(snap.empty){el.innerHTML='<div class="empty-state"><div class="es-icon">💬</div><p>No groups yet.</p></div>';return;}
    let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">';
    snap.forEach(d=>{
      const g=d.data();
      const isMember=g.members&&g.members.includes(ME?.uid);
      html+=`<div style="background:var(--surface);border:1px solid var(--border);padding:1.2rem;cursor:pointer;transition:background 0.3s" onclick="openGroupChat('${d.id}','${(g.name||'').replace(/'/g,"\\'")}')">
        <div style="font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;font-style:italic;color:var(--text);margin-bottom:0.3rem">${g.name||'Group'}</div>
        <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text3);margin-bottom:0.5rem">${(g.members||[]).length} members</div>
        <div style="font-size:0.82rem;color:var(--text3)">${g.description||''}</div>
        ${isMember?'<div style="font-family:DM Mono,monospace;font-size:0.58rem;color:var(--green2);margin-top:0.5rem;text-transform:uppercase;letter-spacing:0.12em">Member</div>':''}
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
  }catch(e){if(el)el.innerHTML=`<div class="err-bar show">${e.message}</div>`;}
}

window.openCreateGroup=async function(){
  const uSnap=await getDocs(collection(db,'users'));
  let memOpts='';
  uSnap.forEach(d=>{const u=d.data();if(u.uid!==ME?.uid)memOpts+=`<option value="${u.uid}">${u.fullName||u.email} (${ROLE_LABELS[u.role]||u.role})</option>`;});
  openModal('Create Group',`

  <div class="fi" style="margin-bottom:0.8rem"><label>Description</label><input id="grp_desc" class="form-input" placeholder="Optional"/></div>

  `<button class="btn-sm btn-sm-gold" onclick="saveGroup()">Create</button><button class="btn-sm" onclick="closeModal()">Cancel</button>`);

window.saveGroup=async function(){
  const name=document.getElementById('grp_name').value.trim();
  const desc=document.getElementById('grp_desc').value.trim();
  const sel=document.getElementById('grp_mem');
  const members=[ME?.uid,...Array.from(sel.selectedOptions).map(o=>o.value)];
  if(!name){document.getElementById('grpErr').textContent='Group name required.';document.getElementById('grpErr').classList.add('show');return;}
  try{
    const ref=await addDoc(collection(db,'groups'),{name,description:desc,members,createdBy:ME.uid,createdByName:ME.fullName||ME.displayName,createdAt:serverTimestamp()});
    closeModal();await loadGroups();openGroupChat(ref.id,name);

window.openGroupChat=function(gid,gname){

  setTimeout(()=>openGroupChatView(gid,gname),100);
};

async function renderTasks(){
  const p=document.getElementById('panel-tasks');
  const r=ME?.role;
  const canAssign=['admin','core','teacher','event_head','volunteer_head'].includes(r);
  p.innerHTML=`
  <div class="section-head">
    <h2>Tasks</h2>
    ${canAssign?`<button class="btn-sm btn-sm-gold" onclick="openAddTask()">+ Assign Task</button>`:''}
  </div>
  <div id="taskList">Loading...</div>`;
  await loadTasks();
}

async function loadTasks(){
  const el=document.getElementById('taskList');if(!el)return;
  const r=ME?.role;
  try{
    let q;
    if(['admin','core','teacher'].includes(r)){
      q=query(collection(db,'tasks'),orderBy('createdAt','desc'));
    } else if(['event_head','volunteer_head'].includes(r)){
      q=query(collection(db,'tasks'),where('assignedBy','==',ME?.uid),orderBy('createdAt','desc'));
    } else {
      q=query(collection(db,'tasks'),where('assignedTo','==',ME?.uid),orderBy('createdAt','desc'));
    }
    const snap=await getDocs(q);
    if(snap.empty){el.innerHTML='<div class="empty-state"><div class="es-icon">✅</div><p>No tasks.</p></div>';return;}
    let html='<div class="table-wrap"><table><thead><tr><th>Task</th><th>Assigned To</th><th>Assigned By</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    for(const d of snap.docs){
      const t=d.data();
      let toName='—',byName='—';
      try{const ts=await getDoc(doc(db,'users',t.assignedTo));if(ts.exists())toName=ts.data().fullName||'—';}catch(e){}
      try{const bs=await getDoc(doc(db,'users',t.assignedBy));if(bs.exists())byName=bs.data().fullName||'—';}catch(e){}
      const statusColors={pending:'badge-grey',in_progress:'badge-green',done:'badge-gold',overdue:'badge-red'};
      const canMark=t.assignedTo===ME?.uid||['admin','core','teacher'].includes(r);
      html+=`<tr><td class="td-name">${t.title||''}</td><td>${toName}</td><td class="td-mono">${byName}</td><td class="td-mono">${t.dueDate||'—'}</td><td><span class="badge ${statusColors[t.status]||'badge-grey'}">${t.status||'pending'}</span></td>
      <td>${canMark?`<select onchange="updateTaskStatus('${d.id}',this.value)" class="form-input" style="-webkit-appearance:auto;padding:0.3rem;font-size:0.75rem;min-width:100px"><option value="pending"${t.status==='pending'?' selected':''}>Pending</option><option value="in_progress"${t.status==='in_progress'?' selected':''}>In Progress</option><option value="done"${t.status==='done'?' selected':''}>Done</option></select>`:'—'}
      ${['admin','core','teacher'].includes(r)?`<button class="btn-icon del" onclick="deleteTask('${d.id}')">🗑️</button>`:''}
      </td></tr>`;
    }
    html+='</tbody></table></div>';
    el.innerHTML=html;
  }catch(e){if(el)el.innerHTML=`<div class="err-bar show">${e.message}</div>`;}
}

window.openAddTask=async function(){
  const uSnap=await getDocs(collection(db,'users'));
  let uOpts='';
  uSnap.forEach(d=>{const u=d.data();uOpts+=`<option value="${u.uid}">${u.fullName||u.email} (${ROLE_LABELS[u.role]||u.role})</option>`;});
  openModal('Assign Task',`

  <div class="fi" style="margin-bottom:0.8rem"><label>Details</label><textarea id="tk_desc" class="form-input" rows="2" placeholder="Additional details..."></textarea></div>

window.saveTask=async function(){
  const title=document.getElementById('tk_title').value.trim();
  const desc=document.getElementById('tk_desc').value.trim();
  const to=document.getElementById('tk_to').value;
  const due=document.getElementById('tk_due').value;

window.deleteTask=async function(id){

// ── CHAT (DMs + Groups) ──
let activeConvId=null;let activeConvType=null;
async function renderChat(){
  const p=document.getElementById('panel-chat');
  p.innerHTML=`<div class="chat-layout">
    <div class="chat-sidebar">
      <div class="chat-sidebar-hd"><span>Conversations</span><button class="btn-sm" style="padding:0.3rem 0.6rem;font-size:0.6rem" onclick="openNewDM()">+ DM</button></div>
      <div class="chat-list" id="chatList"><div style="padding:1rem;font-family:DM Mono,monospace;font-size:0.68rem;color:var(--text3)">Loading...</div></div>
    </div>
    <div class="chat-main" id="chatMain">
      <div class="chat-empty"><div style="font-size:2rem;opacity:0.3">💬</div><span>Select a conversation</span></div>
    </div>
  </div>`;
  await loadChatList();
}

async function loadChatList(){
  const el=document.getElementById('chatList');if(!el)return;
  try{
    // Load DMs where user is participant
    const dmSnap=await getDocs(query(collection(db,'directMessages'),where('participants','array-contains',ME?.uid),orderBy('lastMessageAt','desc')));
    // Load groups where user is member
    const grpSnap=await getDocs(query(collection(db,'groups'),orderBy('createdAt','desc')));
    let html='';
    // DMs
    const dmDocs=dmSnap.docs;
    for(const d of dmDocs){
      const dm=d.data();
      const otherId=dm.participants.find(x=>x!==ME?.uid);
      let otherName='Unknown';
      try{const os=await getDoc(doc(db,'users',otherId));if(os.exists())otherName=os.data().fullName||os.data().email;}catch(e){}
      const unread=(dm.unread||{})[ME?.uid]||0;
      html+=`<div class="chat-item${activeConvId===d.id?' active':''}" onclick="openDMChat('${d.id}','${otherName.replace(/'/g,"\\'")}')">
        <div class="chat-item-name">${otherName}</div>
        <div class="chat-item-preview">${dm.lastMessage||'...'}</div>
        <div class="chat-item-time">${dm.lastMessageAt?fmt(dm.lastMessageAt):''}</div>
        ${unread>0?`<div class="chat-unread">${unread}</div>`:''}
      </div>`;
    }
    // Groups
    grpSnap.docs.forEach(d=>{
      const g=d.data();
      if(!g.members||!g.members.includes(ME?.uid))return;
      html+=`<div class="chat-item${activeConvId===d.id?' active':''}" onclick="openGroupChatView('${d.id}','${(g.name||'').replace(/'/g,"\\'")}')">
        <div class="chat-item-name">👥 ${g.name||'Group'}</div>
        <div class="chat-item-preview">${g.lastMessage||'...'}</div>
        <div class="chat-item-time">${g.lastMessageAt?fmt(g.lastMessageAt):''}</div>
      </div>`;
    });
    if(!html)html='<div class="no-chat">No conversations yet. Start a DM!</div>';
    el.innerHTML=html;
  }catch(e){if(el)el.innerHTML=`<div style="padding:1rem;font-family:DM Mono,monospace;font-size:0.68rem;color:var(--red)">${e.message}</div>`;}
}

window.openNewDM=async function(){
  // Check chat permissions
  let allowedRoles=[];
  try{
    const permSnap=await getDocs(query(collection(db,'chatPermissions'),where('fromRole','==',ME?.role)));
    if(permSnap.empty){
      // Default: can message core, teacher, admin
      allowedRoles=['core','teacher','admin'];
    } else {
      permSnap.forEach(d=>{allowedRoles=[...allowedRoles,...(d.data().toRoles||[])];});
    }
    // Admin, core, teacher can always message anyone
    if(['admin','core','teacher'].includes(ME?.role))allowedRoles=null;
  }catch(e){}

  const uSnap=await getDocs(collection(db,'users'));
  let uOpts='';
  uSnap.forEach(d=>{
    const u=d.data();
    if(u.uid===ME?.uid)return;
    if(allowedRoles&&!allowedRoles.includes(u.role))return;
    uOpts+=`<option value="${u.uid}">${u.fullName||u.email} — ${ROLE_LABELS[u.role]||u.role}</option>`;
  });
  if(!uOpts){openModal('Start DM','<div style="color:var(--text3);font-size:0.9rem">No users available to message based on current permissions.</div>','<button class="btn-sm" onclick="closeModal()">Close</button>');return;}
  openModal('Start Direct Message',`
  <div class="fi"><label>Select User</label><select id="dm_to" class="form-input" style="-webkit-appearance:auto">${uOpts}</select></div>
  <div class="err-bar" id="dmErr"></div>`,
  `<button class="btn-sm btn-sm-gold" onclick="startDM()">Start Chat</button><button class="btn-sm" onclick="closeModal()">Cancel</button>`);
};

window.startDM=async function(){
  const toUid=document.getElementById('dm_to').value;
  if(!toUid)return;
  try{
    // Check if DM already exists
    const existing=await getDocs(query(collection(db,'directMessages'),where('participants','array-contains',ME?.uid)));
    let existingId=null;
    existing.forEach(d=>{if((d.data().participants||[]).includes(toUid))existingId=d.id;});
    if(existingId){closeModal();const os=await getDoc(doc(db,'users',toUid));const name=os.exists()?os.data().fullName||'User':'User';openDMChat(existingId,name);return;}
    // Create new
    const toSnap=await getDoc(doc(db,'users',toUid));
    const toName=toSnap.exists()?toSnap.data().fullName||'User':'User';
    const ref=await addDoc(collection(db,'directMessages'),{participants:[ME?.uid,toUid],participantNames:{[ME?.uid]:ME?.fullName||ME?.displayName,[toUid]:toName},createdAt:serverTimestamp(),lastMessageAt:serverTimestamp(),lastMessage:'',unread:{}});
    closeModal();openDMChat(ref.id,toName);
  }catch(e){document.getElementById('dmErr').textContent=e.message;document.getElementById('dmErr').classList.add('show');}
};

window.openDMChat=function(dmId,otherName){
  activeConvId=dmId;activeConvType='dm';
  if(chatUnsub)chatUnsub();
  loadChatList();
  const main=document.getElementById('chatMain');if(!main)return;
  main.innerHTML=`
  <div class="chat-hd"><div><div class="chat-hd-name">${otherName}</div><div class="chat-hd-sub">Direct Message</div></div></div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Message ${otherName}... (@ to mention)" rows="1" onkeydown="chatKeydown(event,'${dmId}','dm')"></textarea>
    <button class="send-btn" onclick="sendMsg('${dmId}','dm')">Send</button>
  </div>`;
  chatUnsub=onSnapshot(query(collection(db,'directMessages',dmId,'messages'),orderBy('sentAt','asc')),snap=>{
    const el=document.getElementById('chatMsgs');if(!el)return;
    el.innerHTML='';
    snap.forEach(d=>{renderMsgBubble(el,d.data(),d.id);});
    el.scrollTop=el.scrollHeight;
    // Mark delivered
    updateDoc(doc(db,'directMessages',dmId),{[`unread.${ME?.uid}`]:0}).catch(()=>{});
  });
};

window.openGroupChatView=function(gid,gname){
  activeConvId=gid;activeConvType='group';
  if(chatUnsub)chatUnsub();
  loadChatList();
  const main=document.getElementById('chatMain');if(!main)return;
  main.innerHTML=`
  <div class="chat-hd"><div><div class="chat-hd-name">👥 ${gname}</div><div class="chat-hd-sub">Group Chat</div></div></div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Message group... (@ to mention)" rows="1" onkeydown="chatKeydown(event,'${gid}','group')"></textarea>
    <button class="send-btn" onclick="sendMsg('${gid}','group')">Send</button>
  </div>`;
  chatUnsub=onSnapshot(query(collection(db,'groups',gid,'messages'),orderBy('sentAt','asc')),snap=>{
    const el=document.getElementById('chatMsgs');if(!el)return;
    el.innerHTML='';
    snap.forEach(d=>{renderMsgBubble(el,d.data(),d.id,true);});
    el.scrollTop=el.scrollHeight;
    // Mark as seen
    snap.docs.forEach(d=>{
      const msg=d.data();
      if(msg.senderUid!==ME?.uid&&!(msg.seenBy||[]).includes(ME?.uid)){
        updateDoc(doc(db,'groups',gid,'messages',d.id),{seenBy:arrayUnion(ME?.uid)}).catch(()=>{});
      }
    });
  });
};

function renderMsgBubble(container,msg,id,isGroup=false){
  const isMe=msg.senderUid===ME?.uid;
  const wrap=document.createElement('div');wrap.className='msg-wrap '+(isMe?'me':'them');
  let seenStatus='';
  if(isMe&&isGroup&&msg.seenBy&&msg.seenBy.length>1)seenStatus=`<span class="msg-status" title="Seen by ${msg.seenBy.length-1}">✓✓ ${msg.seenBy.length-1}</span>`;
  else if(isMe&&!isGroup&&msg.deliveredAt)seenStatus='<span class="msg-status">✓✓</span>';
  let text=escHtml(msg.text||'').replace(/@(\w[\w\s]*)/g,'<span class="msg-mention">@$1</span>');
  wrap.innerHTML=`${isGroup&&!isMe?`<div class="msg-meta"><span class="msg-sender">${escHtml(msg.senderName||'')}</span></div>`:''}
  <div class="msg-bubble">${text}</div>
  <div class="msg-meta"><span>${fmt(msg.sentAt)}</span>${seenStatus}</div>`;
  container.appendChild(wrap);
}

window.chatKeydown=function(e,convId,type){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(convId,type);}};

window.sendMsg=async function(convId,type){
  const input=document.getElementById('chatInput');
  const text=input?.value.trim();
  if(!text)return;
  input.value='';
  try{
    const colRef=collection(db,type==='dm'?'directMessages':'groups',convId,'messages');
    await addDoc(colRef,{text,senderUid:ME?.uid,senderName:ME?.fullName||ME?.displayName,senderRole:ME?.role||'',sentAt:serverTimestamp(),deliveredAt:serverTimestamp(),seenBy:[ME?.uid]});
    // Update last message on parent doc
    const parentRef=doc(db,type==='dm'?'directMessages':'groups',convId);
    await updateDoc(parentRef,{lastMessage:text,lastMessageAt:serverTimestamp()});
  }catch(e){console.error(e);}
};

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  </div>`;
}
function profileRow(label,val){return`<div style="display:flex;padding:0.8rem 1.2rem;border-bottom:1px solid rgba(106,171,58,0.1)"><div style="font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);width:160px;flex-shrink:0">${label}</div><div style="font-size:0.95rem;color:var(--text2)">${val}</div></div>`;}

// ── INIT ──
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='login.html';return;}
  try{
    const uSnap=await getDoc(doc(db,'users',user.uid));
    if(!uSnap.exists()||!uSnap.data().onboarded){window.location.href='login.html';return;}
    ME={...uSnap.data(),uid:user.uid};
    // Update avatar & name
    document.getElementById('sideAvatar').src=ME.photoURL||'';
    document.getElementById('topAvatar').src=ME.photoURL||'';
    document.getElementById('sideAvatar').onerror=()=>{document.getElementById('sideAvatar').style.display='none';};
    document.getElementById('sideName').textContent=ME.fullName||ME.displayName||'User';
    const rb=document.getElementById('sideRole');
    rb.textContent=ROLE_LABELS[ME.role]||ME.role||'—';
    rb.className='user-role-badge '+roleBadgeClass(ME.role);
    buildNav(ME.role||'pending');
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appShell').style.display='flex';
    renderHome();
    showPanel('home');
  }catch(e){
    document.getElementById('loadingScreen').innerHTML=`<div style="color:var(--red);font-family:DM Mono,monospace;font-size:0.8rem">Error: ${e.message}</div>`;
  }
});
</script>
