<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Critically Yours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;height:100%}
    :root{
      --bg:#08090d;--bg2:#0c0e16;--bg3:#111420;--surface:#f5f5f510;--surface2:#ffffff0e;
      --border:rgba(255,255,255,0.07);--border2:rgba(201,163,72,0.22);
      --gold:#c9a348;--gold2:#e8c46a;--gold3:rgba(201,163,72,0.10);
      --ivory:#f2ead8;--sidebar-w:256px;
      --t1:rgba(255,255,255,0.92);--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.25);
      --f-serif:'Cormorant Garamond',Georgia,serif;
      --f-sans:'Inter',system-ui,sans-serif;
      --f-mono:'JetBrains Mono',monospace;
      --r:12px;--r-sm:8px;
    }
    body{font-family:var(--f-sans);background:var(--bg);color:var(--t1);height:100%;display:flex;flex-direction:column;overflow-x:hidden}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(201,163,72,0.3);border-radius:2px}
    button{cursor:pointer;border:none;background:none;font-family:var(--f-sans)}
    a{text-decoration:none;color:inherit}

    /* ===== LAYOUT ===== */
    #app{display:flex;flex:1;min-height:100vh}

    /* ===== SIDEBAR ===== */
    #sidebar{
      width:var(--sidebar-w);min-height:100vh;
      background:#0b0d14;border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      position:fixed;top:0;left:0;bottom:0;z-index:60;
      transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
      overflow-y:auto;overflow-x:hidden;
    }
    #sidebar::-webkit-scrollbar{width:3px}
    #sidebar::-webkit-scrollbar-thumb{background:transparent}
    #sidebar:hover::-webkit-scrollbar-thumb{background:rgba(201,163,72,0.2)}

    .sb-brand{
      padding:1.25rem 1.25rem 1rem;
      display:flex;align-items:center;gap:10px;
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .sb-logo{width:32px;height:32px;border-radius:7px;background:var(--gold3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .sb-logo img{width:26px;height:26px;object-fit:contain}
    .sb-brand-name{font-family:var(--f-serif);font-size:1.05rem;font-weight:600;color:var(--ivory);line-height:1.1}
    .sb-brand-sub{font-family:var(--f-mono);font-size:0.5rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--t3);display:block;margin-top:2px}

    .sb-user{padding:1rem 1.25rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .sb-avatar{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);object-fit:cover;flex-shrink:0}
    .sb-user-info{flex:1;min-width:0}
    .sb-user-name{font-size:0.82rem;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-user-role{font-family:var(--f-mono);font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-top:2px}

    .sb-nav{flex:1;padding:0.75rem 0.75rem 0}
    .sb-section{font-family:var(--f-mono);font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--t3);padding:0.75rem 0.5rem 0.3rem;display:block}
    .sb-item{
      display:flex;align-items:center;gap:9px;width:100%;
      padding:0.6rem 0.75rem;border-radius:var(--r-sm);
      font-size:0.8rem;color:var(--t2);
      transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;
      text-align:left;
    }
    .sb-item:hover{background:var(--surface);color:var(--t1)}
    .sb-item.active{background:var(--gold3);color:var(--gold2);border-color:rgba(201,163,72,0.18)}
    .sb-item .sb-icon{width:16px;text-align:center;flex-shrink:0;font-size:0.9rem}
    .sb-item .sb-label{flex:1}

    .sb-bottom{padding:0.75rem;border-top:1px solid var(--border);flex-shrink:0}
    .sb-signout{display:flex;align-items:center;gap:8px;width:100%;padding:0.6rem 0.75rem;border-radius:var(--r-sm);font-size:0.8rem;color:var(--t3);transition:all 0.15s}
    .sb-signout:hover{background:rgba(248,113,113,0.07);color:#f87171}

    /* ===== MAIN ===== */
    #main{
      margin-left:var(--sidebar-w);flex:1;
      display:flex;flex-direction:column;min-height:100vh;
    }

    /* ===== TOPBAR ===== */
    #topbar{
      height:58px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1.75rem;position:sticky;top:0;z-index:40;
      background:rgba(8,9,13,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      flex-shrink:0;
    }
    .topbar-title{display:flex;flex-direction:column;gap:2px}
    .topbar-h{font-family:var(--f-serif);font-size:1.25rem;font-weight:600;color:var(--ivory);line-height:1}
    .topbar-sub{font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--t3)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    #mb-toggle{display:none;width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);align-items:center;justify-content:center;color:var(--t2);font-size:1.1rem}

    /* ===== PAGE CONTENT ===== */
    #page{flex:1;padding:1.75rem;overflow-y:auto}

    /* ===== CARDS ===== */
    .card{background:#0f1119;border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
    .card-gold{background:#0f1119;border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem}
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r)}

    /* ===== GRID ===== */
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
    @media(max-width:900px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

    /* ===== STAT CARD ===== */
    .stat-card{
      background:#0f1119;border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;
      position:relative;overflow:hidden;transition:border-color 0.2s;
    }
    .stat-card:hover{border-color:var(--border2)}
    .stat-card::after{content:'';position:absolute;right:-10px;bottom:-10px;width:70px;height:70px;background:radial-gradient(circle,rgba(201,163,72,0.07),transparent 70%);border-radius:50%;pointer-events:none}
    .stat-n{font-family:var(--f-serif);font-size:2.25rem;font-weight:600;color:var(--gold2);line-height:1}
    .stat-l{font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);margin-top:5px}

    /* ===== TABLE ===== */
    .tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
    .tbl-wrap table{width:100%;border-collapse:collapse;font-size:0.83rem}
    .tbl-wrap th{
      font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--gold);font-weight:400;padding:0.75rem 1rem;text-align:left;
      background:#0c0e16;border-bottom:1px solid var(--border);white-space:nowrap;
    }
    .tbl-wrap td{padding:0.75rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--t2);vertical-align:middle}
    .tbl-wrap tbody tr:hover{background:rgba(255,255,255,0.015)}
    .tbl-wrap tbody tr:last-child td{border-bottom:none}

    /* ===== BADGE ===== */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.07em;font-weight:400}
    .badge-pending{background:rgba(201,163,72,0.1);color:var(--gold);border:1px solid rgba(201,163,72,0.2)}
    .badge-selected{background:rgba(74,222,128,0.1);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
    .badge-waitlisted{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2)}
    .badge-published{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2)}
    .badge-draft{background:rgba(100,116,139,0.12);color:#94a3b8;border:1px solid rgba(100,116,139,0.2)}
    .badge-student{background:rgba(74,222,128,0.08);color:#86efac;border:1px solid rgba(74,222,128,0.15)}
    .badge-event_head{background:rgba(201,163,72,0.1);color:var(--gold);border:1px solid rgba(201,163,72,0.2)}
    .badge-core_team{background:rgba(96,165,250,0.1);color:#7dd3fc;border:1px solid rgba(96,165,250,0.2)}
    .badge-teacher{background:rgba(168,85,247,0.1);color:#c4b5fd;border:1px solid rgba(168,85,247,0.2)}
    .badge-admin{background:rgba(248,113,113,0.1);color:#fca5a5;border:1px solid rgba(248,113,113,0.2)}

    /* ===== FORM ===== */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
    .form-label{font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);opacity:0.8}
    .form-input{
      width:100%;padding:0.65rem 0.875rem;border-radius:var(--r-sm);
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      color:var(--t1);font-family:var(--f-sans);font-size:0.85rem;
      transition:border-color 0.2s,box-shadow 0.2s;outline:none;
    }
    .form-input:focus{border-color:rgba(201,163,72,0.45);box-shadow:0 0 0 3px rgba(201,163,72,0.07)}
    .form-input::placeholder{color:var(--t3)}
    .form-input:disabled{opacity:0.45;cursor:not-allowed}
    select.form-input{appearance:none;cursor:pointer}
    textarea.form-input{resize:vertical;min-height:90px;line-height:1.6}

    /* ===== BUTTONS ===== */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0.55rem 1.1rem;border-radius:var(--r-sm);font-size:0.8rem;font-weight:500;transition:all 0.2s;cursor:pointer;white-space:nowrap}
    .btn-gold{background:var(--gold);color:#08090d;box-shadow:0 0 16px rgba(201,163,72,0.25)}
    .btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
    .btn-ghost{color:var(--t2);border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--t1);background:var(--surface2)}
    .btn-danger{background:rgba(248,113,113,0.1);color:#fca5a5;border:1px solid rgba(248,113,113,0.2)}
    .btn-danger:hover{background:rgba(248,113,113,0.18)}
    .btn-sm{padding:0.35rem 0.75rem;font-size:0.72rem}
    .btn:disabled{opacity:0.45;cursor:not-allowed;transform:none!important}

    /* ===== DIVIDER ===== */
    .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,163,72,0.2),transparent);border:none;margin:1.25rem 0}

    /* ===== SPINNER ===== */
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== SECTION HEADER ===== */
    .ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
    .ph-title{font-family:var(--f-serif);font-size:1.6rem;font-weight:600;color:var(--ivory);line-height:1.1}
    .ph-sub{font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--t3);margin-top:3px}
    .ph-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* ===== MODAL ===== */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(4,5,8,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;padding:1.5rem;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal-box{
      width:100%;max-width:580px;max-height:88vh;overflow-y:auto;
      border-radius:var(--r);background:#0f1119;border:1px solid var(--border2);
      box-shadow:0 32px 80px rgba(0,0,0,0.8);
      transform:translateY(16px) scale(0.98);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .modal-overlay.open .modal-box{transform:translateY(0) scale(1)}
    .modal-box::-webkit-scrollbar{width:4px}
    .modal-box::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
    .modal-head{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
    .modal-body{padding:1.25rem 1.5rem 1.5rem}
    .modal-title{font-family:var(--f-serif);font-size:1.4rem;font-weight:600;color:var(--ivory)}
    .modal-close{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);color:var(--t2);font-size:0.9rem;transition:all 0.15s;flex-shrink:0}
    .modal-close:hover{background:var(--surface2);color:var(--t1)}

    /* ===== TOAST ===== */
    #toast-root{position:fixed;bottom:1.25rem;right:1.25rem;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
    .toast{display:flex;align-items:center;gap:9px;padding:0.75rem 1.1rem;border-radius:var(--r-sm);font-size:0.8rem;background:#181b26;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:translateX(110%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);pointer-events:all;min-width:240px}
    .toast.show{transform:translateX(0)}
    .toast.success{border-left:3px solid #4ade80}
    .toast.error{border-left:3px solid #f87171}
    .toast.info{border-left:3px solid var(--gold)}

    /* ===== NOTICE/MSG CARDS ===== */
    .notice-card{background:#0f1119;border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:0.75rem;transition:border-color 0.2s}
    .notice-card:hover{border-color:var(--border2)}
    .nc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:0.5rem}
    .nc-title{font-family:var(--f-serif);font-size:1rem;font-weight:600;color:var(--ivory);line-height:1.2}
    .nc-meta{font-family:var(--f-mono);font-size:0.58rem;color:var(--t3);margin-top:4px;letter-spacing:0.05em}
    .nc-body{font-size:0.82rem;color:var(--t2);line-height:1.65;margin-top:0.5rem}

    /* ===== MSG THREAD ===== */
    .msg-thread{display:flex;flex-direction:column;gap:10px;padding:1rem;min-height:250px;max-height:350px;overflow-y:auto}
    .msg-bubble{max-width:72%;padding:0.65rem 0.875rem;border-radius:10px;font-size:0.83rem;line-height:1.5}
    .msg-sent{background:rgba(201,163,72,0.12);border:1px solid rgba(201,163,72,0.18);border-bottom-right-radius:3px;align-self:flex-end}
    .msg-recv{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;align-self:flex-start}
    .msg-ts{font-family:var(--f-mono);font-size:0.55rem;color:var(--t3);margin-top:3px}
    .msg-input-row{display:flex;gap:8px;padding:0.875rem;border-top:1px solid var(--border)}

    /* ===== ACTIVITY FEED ===== */
    .af-item{display:flex;align-items:flex-start;gap:12px;padding:0.875rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .af-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px;box-shadow:0 0 0 3px rgba(201,163,72,0.1)}
    .af-text{font-size:0.82rem;color:var(--t2);line-height:1.5}
    .af-ts{font-family:var(--f-mono);font-size:0.58rem;color:var(--t3);margin-top:3px}

    /* ===== TOGGLE ===== */
    .toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
    .toggle-track{width:38px;height:21px;border-radius:999px;background:rgba(255,255,255,0.08);border:1px solid var(--border);position:relative;transition:background 0.2s;flex-shrink:0}
    .toggle-track.on{background:linear-gradient(90deg,var(--gold),#b8860b)}
    .toggle-thumb{position:absolute;top:2px;left:2px;width:15px;height:15px;background:rgba(255,255,255,0.9);border-radius:50%;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.4)}
    .toggle-track.on .toggle-thumb{transform:translateX(17px)}

    /* ===== PERMISSION GRID ===== */
    .perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
    .perm-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border)}
    .perm-label{font-size:0.78rem;color:var(--t2)}

    /* ===== EMPTY STATE ===== */
    .empty{text-align:center;padding:4rem 2rem;color:var(--t3)}
    .empty-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.4}
    .empty-msg{font-family:var(--f-serif);font-style:italic;font-size:1.1rem;color:var(--t3)}

    /* ===== MOBILE ===== */
    @media(max-width:768px){
      #sidebar{transform:translateX(-100%)}
      #sidebar.open{transform:translateX(0);box-shadow:4px 0 40px rgba(0,0,0,0.6)}
      #main{margin-left:0!important}
      #mb-toggle{display:flex}
      #page{padding:1rem}
      .form-row{grid-template-columns:1fr}
    }
    #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:55;display:none}
    #overlay.open{display:block}

    /* ===== SEARCH ===== */
    .search-box{position:relative}
    .search-box input{padding-left:2.25rem}
    .search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);font-size:0.8rem;color:var(--t3);pointer-events:none}

    /* ===== LOADING ===== */
    #loading-screen{
      position:fixed;inset:0;z-index:300;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
    }
    #loading-screen p{font-family:var(--f-mono);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--t3)}

    /* ===== ROLE COLOR ===== */
    .role-label{
      font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;
      padding:3px 8px;border-radius:999px;display:inline-block;
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner" style="width:28px;height:28px"></div>
  <p>Authenticating…</p>
</div>

<!-- Mobile overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<div id="app" style="display:none">
  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <img src="cys_logo.png" alt="CYS" onerror="this.outerHTML='<span style=\'font-family:var(--f-serif);font-size:0.9rem;color:var(--gold);font-style:italic\'>CY</span>'"/>
      </div>
      <div>
        <div class="sb-brand-name">Critically <em style="font-style:italic;color:var(--gold)">Yours</em></div>
        <span class="sb-brand-sub">DPS Megacity</span>
      </div>
    </div>
    <div class="sb-user" id="sb-user">
      <img class="sb-avatar" id="sb-avatar" src="" alt=""/>
      <div class="sb-user-info">
        <div class="sb-user-name" id="sb-name">Loading…</div>
        <div class="sb-user-role" id="sb-role">—</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-bottom">
      <button class="sb-signout" onclick="doSignOut()">
        <span style="font-size:0.85rem">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div id="main">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="mb-toggle" onclick="toggleSidebar()">☰</button>

/* ── Toast ── */
function toast(msg, type="info", dur=3200){
  const root=document.getElementById("toast-root");
  const icons={success:"✓",error:"✕",info:"◆"};
  const t=document.createElement("div");
  t.className=`toast ${type}`;
  t.innerHTML=`<span style="flex-shrink:0">${icons[type]||"◆"}</span><span style="flex:1">${msg}</span>`;
  root.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),350)},dur);
}
window.toast = toast;

/* ── All permissions master list ── */
const ALL_PERMS = {
  "Events": {
    viewEvents:        "View Events",

function getAllPermKeys(){ return Object.values(ALL_PERMS).flatMap(g=>Object.keys(g)); }
function permObj(keys){ const p={}; getAllPermKeys().forEach(k=>p[k]=keys.includes(k)); return p; }
function allPermsTrue(){ const p={}; getAllPermKeys().forEach(k=>p[k]=true); return p; }

function can(perm){ return UD?.permissions?.[perm]===true || UD?.role==="admin" }

/* ── Auth ── */
onAuthStateChanged(auth, async user=>{

function buildSidebar(){
  const nav = document.getElementById("sb-nav");

  }).join("");
}

function getSidebarItems(){
  const items = [{type:"section",label:"General"}];
  items.push({view:"overview", icon:"⬡", label:"Overview"});

  if(can("viewEvents")||can("viewAllEvents")){
    items.push({type:"section",label:"Events"});
    items.push({view:"events", icon:"📋", label:"Events"});
  }
  if(can("viewRegistrations")||can("viewParticipants")){
    items.push({view:"participants", icon:"👥", label:"Participants"});
  }
  if(can("viewNotices")||can("manageNotices")){
    items.push({type:"section",label:"Content"});

  if(UD.role==="admin"||can("systemSettings")){

/* ── Global data listeners ── */
function loadGlobalData(){
  // Events
  const eu = onSnapshot(query(collection(db,"events"),orderBy("createdAt","desc")),s=>{
    allEvents=s.docs.map(d=>({id:d.id,...d.data()}));
    if(currentView==="events"||currentView==="overview"||currentView==="analytics") renderCurrentView();
  }); unsubs.push(eu);

  // Users (admin/teacher only)
  if(can("manageUsers")){
    const uu = onSnapshot(collection(db,"users"),s=>{
      allUsers=s.docs.map(d=>({id:d.id,...d.data()}));
      if(currentView==="users") renderCurrentView();
    }); unsubs.push(uu);
  }

  // Registrations
  if(can("viewRegistrations")){
    let q2;
    if(UD.role==="event_head"&&UD.assignedEvent){
      q2=query(collection(db,"registrations"),where("eventId","==",UD.assignedEvent));
    } else {
      q2=query(collection(db,"registrations"),orderBy("registeredAt","desc"));
    }
    const ru=onSnapshot(q2,s=>{
      allRegs=s.docs.map(d=>({id:d.id,...d.data()}));
      if(currentView==="participants"||currentView==="overview") renderCurrentView();
    }); unsubs.push(ru);
  }

  // Notices
  if(can("viewNotices")){
    let nq;
    if(UD.role==="event_head"&&UD.assignedEvent){
      nq=query(collection(db,"notices_tasks"),where("eventId","==",UD.assignedEvent),where("type","==","notice"),orderBy("timestamp","desc"));
    } else {
      nq=query(collection(db,"notices_tasks"),where("type","==","notice"),orderBy("timestamp","desc"));
    }
    const nu=onSnapshot(nq,s=>{
      allNotices=s.docs.map(d=>({id:d.id,...d.data()}));
      if(currentView==="notices") renderCurrentView();
    }); unsubs.push(nu);
  }
}

function renderCurrentView(){ if(currentView) navigate(currentView,true); }

/* ── Navigate ── */
window.navigate = function(view, silent=false){
  currentView=view;
  if(!silent){
    document.querySelectorAll(".sb-item").forEach(el=>el.classList.toggle("active",el.dataset.view===view));
    closeSidebar();

  const page = document.getElementById("page");

    overview:"Overview",participants:"Participants",events:"Events",
    notices:"Notices",tasks:"Tasks",messages:"Messages",analytics:"Analytics",
    activity:"Activity Log",users:"User Management",settings:"Settings"
  };
  document.getElementById("tb-title").textContent = titles[view]||"Dashboard";

  const views = {
    overview:  viewOverview,
    events:    viewEvents,
    participants: viewParticipants,
    notices:   viewNotices,
    tasks:     viewTasks,
    messages:  viewMessages,
    analytics: viewAnalytics,
    activity:  viewActivity,
    users:     viewUsers,
    settings:  viewSettings
  };
  (views[view]||viewOverview)(page);
};

      </div>
    </form>`;
}

window.saveEvent = async(e, editId)=>{
  e.preventDefault();
  const btn=document.getElementById("ef-btn");
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
  try{
    const data={
      title:document.getElementById("ef-title").value.trim(),
      category:document.getElementById("ef-cat").value,
      description:document.getElementById("ef-desc").value.trim(),
      venue:document.getElementById("ef-venue").value.trim(),
      time:document.getElementById("ef-time").value.trim(),
      maxTeamSize:document.getElementById("ef-team").value?parseInt(document.getElementById("ef-team").value):null,
      rules:document.getElementById("ef-rules").value.split("\n").map(r=>r.trim()).filter(Boolean),
      updatedAt:serverTimestamp()
    };
    if(editId){
      await updateDoc(doc(db,"events",editId),data);
      toast("Event updated.","success");
    } else {
      data.createdAt=serverTimestamp();
      data.registrationCount=0;
      await addDoc(collection(db,"events"),data);
      toast("Event added.","success");
    }
    closeModal("m-addevent");
  }catch(err){toast("Error: "+err.message,"error");}
  btn.disabled=false; btn.textContent=editId?"Save Changes":"Add Event";
};

window.deleteEvent = async(id)=>{
  if(!confirm("Delete this event? All registrations will remain.")) return;
  try{ await deleteDoc(doc(db,"events",id)); toast("Event deleted.","info"); }
  catch(err){toast("Error: "+err.message,"error");}
};

        </div>

async function loadContacts(){
  const contactsEl = document.getElementById("msg-contacts");
  if(!contactsEl) return;
  try{
    const sentQ = query(collection(db,"messages"),where("senderUid","==",CU.uid));
    const recvQ = query(collection(db,"messages"),where("receiverUid","==",CU.uid));
    const [sent,recv] = await Promise.all([getDocs(sentQ),getDocs(recvQ)]);
    const allM = [...sent.docs.map(d=>d.data()),...recv.docs.map(d=>d.data())];
    const uids = [...new Set(allM.flatMap(m=>[m.senderUid,m.receiverUid]).filter(u=>u!==CU.uid))];
    if(!uids.length){contactsEl.innerHTML=`<p style="font-size:0.75rem;color:var(--t3);padding:0.5rem">No conversations yet.</p>`;return;}
    const contacts = [];
    for(const uid of uids){
      const s=await getDoc(doc(db,"users",uid));
      if(s.exists()) contacts.push({uid,...s.data()});
    }
    contactsEl.innerHTML=contacts.map(c=>`
      <button style="display:flex;align-items:center;gap:8px;width:100%;padding:0.6rem;border-radius:var(--r-sm);text-align:left;color:var(--t2);transition:all 0.15s" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''" onclick="openConversation('${c.uid}','${c.name||c.email}')">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--gold3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;color:var(--gold);font-weight:600">${(c.name||c.email||"?")[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0"><div style="font-size:0.8rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name||c.email}</div>
        <div style="font-family:var(--f-mono);font-size:0.56rem;color:var(--t3)">${c.role||"student"}</div></div>
      </button>`).join("");
  }catch(e){contactsEl.innerHTML=`<p style="font-size:0.75rem;color:var(--t3);padding:0.5rem">Error loading.</p>`;}
}

window.openConversation = async(uid, name)=>{
  const panel = document.getElementById("msg-panel");
  if(!panel) return;
  panel.innerHTML=`
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--gold3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--gold);font-weight:600">${name[0].toUpperCase()}</div>
      <div style="font-weight:500;font-size:0.88rem">${name}</div>
    </div>
    <div class="msg-thread" id="thread-${uid}"></div>
    <div class="msg-input-row">
      <input class="form-input" id="msg-input" placeholder="Type a message…" style="flex:1" onkeydown="if(event.key==='Enter')sendMsg('${uid}')"/>
      <button class="btn btn-gold btn-sm" onclick="sendMsg('${uid}')">Send</button>
    </div>`;

  const q = query(collection(db,"messages"),
    where("senderUid","in",[CU.uid,uid]),
    where("receiverUid","in",[CU.uid,uid]),
    orderBy("timestamp","asc"));
  onSnapshot(q,s=>{
    const thread=document.getElementById(`thread-${uid}`);
    if(!thread) return;
    const msgs=s.docs.map(d=>d.data()).filter(m=>(m.senderUid===CU.uid&&m.receiverUid===uid)||(m.senderUid===uid&&m.receiverUid===CU.uid));
    thread.innerHTML=msgs.map(m=>`
      <div style="display:flex;flex-direction:column;align-items:${m.senderUid===CU.uid?"flex-end":"flex-start"}">
        <div class="msg-bubble ${m.senderUid===CU.uid?"msg-sent":"msg-recv"}">${m.messageBody}</div>
        <div class="msg-ts">${fmtShort(m.timestamp)}</div>
      </div>`).join("");
    thread.scrollTop=thread.scrollHeight;
  });
};

window.sendMsg = async(receiverUid)=>{
  const input=document.getElementById("msg-input");
  const body=input?.value.trim(); if(!body) return;
  try{
    await addDoc(collection(db,"messages"),{senderUid:CU.uid,receiverUid,messageBody:body,timestamp:serverTimestamp()});
    input.value="";
  }catch(e){toast("Failed to send.","error");}
};

window.openRoleModal = async(uid)=>{
  const u=allUsers.find(x=>x.id===uid);
  if(!u) return;

  // Load existing sub-roles
  const srSnap=await getDocs(collection(db,"sub_roles"));
  const subRoles=srSnap.docs.map(d=>({id:d.id,...d.data()}));

  document.getElementById("m-role-title").textContent=`Manage Role — ${u.name||u.email}`;
  const currentPerms = u.permissions||{};
  document.getElementById("m-role-body").innerHTML=`
    <form id="f-role" onsubmit="saveRole(event,'${uid}')">
      <div class="form-row" style="margin-bottom:1rem">
        <div class="form-group"><label class="form-label">Base Role</label>
          <select class="form-input" id="rl-role" onchange="onRoleChange()">
            ${["student","event_head","core_team","teacher","admin"].map(r=>`<option value="${r}" ${u.role===r?"selected":""}>${r.replace("_"," ")}</option>`).join("")}
          </select></div>
        <div class="form-group"><label class="form-label">Sub-Role</label>
          <select class="form-input" id="rl-subrole">
            <option value="">— None —</option>
            ${subRoles.map(sr=>`<option value="${sr.name}" ${u.subRole===sr.name?"selected":""}>${sr.name}</option>`).join("")}
          </select></div>
      </div>
      <div class="form-group"><label class="form-label">Assigned Event</label>
        <select class="form-input" id="rl-event">
          <option value="">— No event assigned —</option>
          ${allEvents.map(e=>`<option value="${e.id}" ${u.assignedEvent===e.id?"selected":""}>${e.title}</option>`).join("")}
        </select></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0"/>
      <div style="font-family:var(--f-mono);font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:0.875rem">Access Permissions</div>
      <div id="perm-grid">${buildPermGrid(currentPerms)}</div>
      <div style="display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap">
        <button type="submit" class="btn btn-gold" id="rl-btn">Save Changes</button>
        <button type="button" class="btn btn-ghost" onclick="selectAllPerms(true)">Grant All</button>
        <button type="button" class="btn btn-ghost" onclick="selectAllPerms(false)">Revoke All</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('m-role')">Cancel</button>
      </div>
    </form>`;
  openModal("m-role");
};

function buildPermGrid(currentPerms){
  return Object.entries(ALL_PERMS).map(([group,perms])=>`
    <div style="margin-bottom:1rem">
      <div style="font-size:0.72rem;font-weight:600;color:var(--t2);margin-bottom:0.5rem;padding:0 2px">${group}</div>
      <div class="perm-grid">
        ${Object.entries(perms).map(([key,label])=>`
          <div class="perm-item">
            <span class="perm-label">${label}</span>
            <div class="toggle-wrap" onclick="togglePerm('${key}',this)">
              <div class="toggle-track ${currentPerms[key]?"on":""}" id="tp-${key}">
                <div class="toggle-thumb"></div>
              </div>
            </div>
          </div>`).join("")}
      </div>
    </div>`).join("");
}

window.togglePerm=(key,wrap)=>{
  const track=document.getElementById(`tp-${key}`);
  track.classList.toggle("on");
};

window.selectAllPerms=(val)=>{
  getAllPermKeys().forEach(k=>{
    const t=document.getElementById(`tp-${k}`);
    if(t) val?t.classList.add("on"):t.classList.remove("on");
  });
};

window.onRoleChange=()=>{
  const role=document.getElementById("rl-role").value;
  const defaultPerms=getDefaultPerms(role);
  getAllPermKeys().forEach(k=>{
    const t=document.getElementById(`tp-${k}`);
    if(t) defaultPerms[k]?t.classList.add("on"):t.classList.remove("on");
  });
};

function getDefaultPerms(role){
  const base={};
  getAllPermKeys().forEach(k=>base[k]=false);
  if(role==="admin") getAllPermKeys().forEach(k=>base[k]=true);
  else if(role==="teacher"){
    ["viewEvents","viewAllEvents","viewRegistrations","viewParticipants","selectParticipants","manageRegistrations","viewNotices","manageNotices","viewTasks","manageTasks","viewMessages","sendMessages","viewAnalytics","viewActivityLog","assignRoles"].forEach(k=>base[k]=true);
  } else if(role==="event_head"){
    ["viewEvents","viewRegistrations","viewParticipants","viewNotices","manageNotices","viewTasks","manageTasks","viewMessages","sendMessages"].forEach(k=>base[k]=true);
  } else if(role==="core_team"){
    ["viewEvents","viewAllEvents","viewRegistrations","viewAnalytics","viewMessages","viewNotices","viewTasks"].forEach(k=>base[k]=true);
  } else {
    ["viewEvents","viewNotices","viewTasks"].forEach(k=>base[k]=true);
  }
  return base;
}
function getAllPermKeys(){ return Object.values(ALL_PERMS).flatMap(g=>Object.keys(g)); }

window.saveRole=async(e, uid)=>{
  e.preventDefault();
  const btn=document.getElementById("rl-btn"); btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
  try{
    const perms={};
    getAllPermKeys().forEach(k=>perms[k]=document.getElementById(`tp-${k}`)?.classList.contains("on")||false);
    await updateDoc(doc(db,"users",uid),{
      role:document.getElementById("rl-role").value,
      subRole:document.getElementById("rl-subrole").value||null,
      assignedEvent:document.getElementById("rl-event").value||null,
      permissions:perms
    });
    toast("Role updated.","success"); closeModal("m-role");
  }catch(err){toast("Error: "+err.message,"error");}
  btn.disabled=false; btn.textContent="Save Changes";
};

/* ── Sub-Role Manager ── */
window.openSubRoleManager=async()=>{
  document.getElementById("m-subrole-title").textContent="Sub-Role Manager";
  const srSnap=await getDocs(collection(db,"sub_roles"));
  const subRoles=srSnap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById("m-subrole-body").innerHTML=`
    <div id="sr-list" style="margin-bottom:1.25rem">
      ${subRoles.length?subRoles.map(sr=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px">
          <div>
            <span style="font-size:0.85rem;font-weight:500;color:var(--t1)">${sr.name}</span>
            <span style="font-size:0.72rem;color:var(--t3);margin-left:8px">${sr.parentRole||"any"}</span>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteSubRole('${sr.id}')">✕</button>
        </div>`).join(""):`<p style="color:var(--t3);font-size:0.82rem;margin-bottom:0.75rem">No sub-roles yet.</p>`}
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin-bottom:1.25rem"/>
    <form id="f-sr" onsubmit="addSubRole(event)">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sub-Role Name *</label>
          <input class="form-input" id="sr-name" required placeholder="e.g. Design Head"/></div>
        <div class="form-group"><label class="form-label">Parent Role</label>
          <select class="form-input" id="sr-parent">
            <option value="">Any</option>
            ${["student","event_head","core_team","teacher"].map(r=>`<option value="${r}">${r.replace("_"," ")}</option>`).join("")}
          </select></div>
      </div>
      <div style="display:flex;gap:8px">
        <button type="submit" class="btn btn-gold" id="sr-btn">Add Sub-Role</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('m-subrole')">Close</button>
      </div>
    </form>`;
  openModal("m-subrole");
};

window.addSubRole=async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("sr-btn"); btn.disabled=true;
  try{
    await addDoc(collection(db,"sub_roles"),{
      name:document.getElementById("sr-name").value.trim(),
      parentRole:document.getElementById("sr-parent").value||null,
      createdAt:serverTimestamp()
    });
    toast("Sub-role added.","success");
    openSubRoleManager();
  }catch(err){toast("Error: "+err.message,"error"); btn.disabled=false;}
};
window.deleteSubRole=async(id)=>{
  if(!confirm("Delete sub-role?")) return;
  try{await deleteDoc(doc(db,"sub_roles",id)); toast("Deleted.","info"); openSubRoleManager();}
  catch(e){toast("Error.","error");}
};

/* ── Modal helpers ── */
window.openModal=(id)=>{document.getElementById(id).classList.add("open");document.body.style.overflow="hidden"};
window.closeModal=(id)=>{document.getElementById(id).classList.remove("open");document.body.style.overflow=""};

// Close on overlay click
document.querySelectorAll(".modal-overlay").forEach(el=>{
  el.addEventListener("click",e=>{if(e.target===el){el.classList.remove("open");document.body.style.overflow=""}});
});

/* ── Sidebar mobile ── */
window.toggleSidebar=()=>{
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
};
window.closeSidebar=()=>{
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
};
</script>
