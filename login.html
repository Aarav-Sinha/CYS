<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Critically Yours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    :root{
      --bg:#08090d;--bg2:#0e1017;--bg3:#141720;
      --border:rgba(255,255,255,0.07);--border2:rgba(201,163,72,0.25);
      --gold:#c9a348;--gold2:#e8c46a;--gold3:rgba(201,163,72,0.1);
      --ivory:#f2ead8;
      --t1:rgba(255,255,255,0.92);--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.28);
      --f-serif:'Cormorant Garamond',Georgia,serif;
      --f-sans:'Inter',system-ui,sans-serif;
      --f-mono:'JetBrains Mono',monospace;
      --r:14px;--r-sm:8px;
    }
    body{
      font-family:var(--f-sans);background:var(--bg);color:var(--t1);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(201,163,72,0.06) 0%,transparent 60%);
      pointer-events:none;
    }
    .orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(201,163,72,0.07),transparent 70%);top:-200px;left:-150px}
    .orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(100,80,200,0.04),transparent 70%);bottom:-100px;right:-100px}

    .card{
      width:100%;max-width:420px;margin:1.5rem;
      background:#0f1119;border:1px solid var(--border2);border-radius:var(--r);
      box-shadow:0 32px 80px rgba(0,0,0,0.7);padding:2.5rem;
      position:relative;z-index:1;
      animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}

    .brand{text-align:center;margin-bottom:2rem}
    .logo-box{
      width:72px;height:72px;border-radius:14px;
      background:var(--gold3);border:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 1rem;overflow:hidden;
    }
    .logo-box img{width:56px;height:56px;object-fit:contain}
    .brand-title{font-family:var(--f-serif);font-size:1.75rem;font-weight:600;color:var(--ivory)}
    .brand-title em{font-style:italic;color:var(--gold)}
    .brand-inst{font-family:var(--f-mono);font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--t3);margin-top:4px}

    .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,163,72,0.25),transparent);margin:1.75rem 0}

    .section-label{font-family:var(--f-mono);font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);opacity:0.8;text-align:center;display:block;margin-bottom:1.25rem}

    .google-btn{
      width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
      padding:0.85rem 1.5rem;border-radius:var(--r-sm);
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
      color:var(--t1);font-family:var(--f-sans);font-size:0.9rem;font-weight:500;
      cursor:pointer;transition:all 0.2s;
    }
    .google-btn:hover{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
    .google-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .info-box{
      background:var(--gold3);border:1px solid var(--border2);border-radius:var(--r-sm);
      padding:12px 14px;font-size:0.78rem;color:var(--t2);line-height:1.6;
      margin-top:1.25rem;
    }
    .info-box strong{color:var(--gold);font-weight:500}

    .back-link{
      display:flex;align-items:center;justify-content:center;gap:6px;
      margin-top:1.75rem;font-size:0.78rem;color:var(--t3);text-decoration:none;
      transition:color 0.2s;
    }
    .back-link:hover{color:var(--t2)}

    #error-msg{
      background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);
      border-radius:var(--r-sm);padding:10px 14px;font-size:0.8rem;color:#fca5a5;
      margin-top:1rem;display:none;
    }

    #toast-root{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{
      display:flex;align-items:center;gap:10px;padding:0.875rem 1.25rem;
      border-radius:var(--r-sm);font-size:0.83rem;
      background:#1a1d27;border:1px solid var(--border);
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
      transform:translateX(110%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
      min-width:240px;
    }
    .toast.show{transform:translateX(0)}
    .toast.success{border-left:3px solid #4ade80}
    .toast.error{border-left:3px solid #f87171}
    .toast.info{border-left:3px solid var(--gold)}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="brand">
    <div class="logo-box">
      <img src="cys_logo.png" alt="CYS" onerror="this.outerHTML='<span style=\'font-family:var(--f-serif);font-size:1.6rem;color:var(--gold);font-style:italic\'>CY</span>'"/>
    </div>
    <div class="brand-title">Critically <em>Yours</em></div>
    <div class="brand-inst">DPS Megacity · Kolkata</div>
  </div>

  <div class="divider"></div>

  <span class="section-label">Sign in to continue</span>

  <button class="google-btn" id="google-btn" onclick="signInGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div id="error-msg"></div>

  <div class="info-box">
    <strong>Students:</strong> Sign in to enrol for events.<br/>
    <strong>Staff / Team:</strong> Your role is assigned by the administrator after sign-in.
  </div>

  <a href="index.html" class="back-link">← Back to Homepage</a>
</div>

<div id="toast-root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCw-1ZShAXu8c5ZqnFXvS5S-YRqHReMydk",
  authDomain:"critically-yours.firebaseapp.com",
  projectId:"critically-yours",
  storageBucket:"critically-yours.firebasestorage.app",
  messagingSenderId:"861621080895",
  appId:"1:861621080895:web:14f06cbf7d98402dc8398a"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({prompt:"select_account"});

const ADMIN_EMAIL = "aaravhfs@gmail.com";

// Get redirect params
const params = new URLSearchParams(window.location.search);
const nextUrl  = params.get("next") || "dashboard.html";

function toast(msg, type="info"){
  const root = document.getElementById("toast-root");
  const t = document.createElement("div");
  t.className=`toast ${type}`;
  t.textContent=msg;
  root.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),350)},3000);
}

// If already signed in, redirect
onAuthStateChanged(auth, async user=>{
  if(user){
    await ensureUserDoc(user);
    window.location.href = nextUrl;
  }
});

async function ensureUserDoc(user){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    const role = user.email===ADMIN_EMAIL ? "admin" : "student";
    await setDoc(ref,{
      uid: user.uid,
      name: user.displayName||"",
      email: user.email||"",
      photoURL: user.photoURL||"",
      role,
      subRole: null,
      assignedEvent: null,
      permissions: role==="admin" ? getAllPermissions() : getDefaultPermissions("student"),
      createdAt: serverTimestamp()
    });
  } else {
    // If admin email but not yet set as admin
    if(user.email===ADMIN_EMAIL && snap.data().role!=="admin"){
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
        .then(({updateDoc})=>updateDoc(ref,{role:"admin",permissions:getAllPermissions()}));
    }
  }
}

function getAllPermissions(){
  return {
    viewEvents:true, manageEvents:true, viewRegistrations:true, manageRegistrations:true,
    viewParticipants:true, selectParticipants:true, viewNotices:true, manageNotices:true,
    viewTasks:true, manageTasks:true, viewMessages:true, sendMessages:true,
    viewAnalytics:true, manageUsers:true, manageRoles:true, manageSubRoles:true,
    viewActivityLog:true, systemSettings:true, assignRoles:true, viewAllEvents:true
  };
}
function getDefaultPermissions(role){
  return {
    viewEvents: true,
    manageEvents: (role === "admin"),
    viewAllEvents: (role === "admin" || role === "teacher" || role === "core_team"),
    viewRegistrations: (role === "admin" || role === "teacher" || role === "core_team" || role === "event_head"),
    manageRegistrations: (role === "admin" || role === "teacher"),
    selectParticipants: (role === "admin" || role === "teacher"),
    viewParticipants: (role === "admin" || role === "teacher" || role === "event_head"),
    viewNotices: true,
    manageNotices: (role === "admin" || role === "teacher" || role === "event_head"),
    viewTasks: true,
    manageTasks: (role === "admin" || role === "teacher" || role === "event_head"),
    viewMessages: (role !== "student"),
    sendMessages: (role !== "student"),
    viewAnalytics: (role === "admin" || role === "teacher" || role === "core_team"),
    viewActivityLog: (role === "admin" || role === "teacher"),
    manageUsers: (role === "admin"),
    manageRoles: (role === "admin"),
    manageSubRoles: (role === "admin"),
    assignRoles: (role === "admin" || role === "teacher"),
    systemSettings: (role === "admin")
  };
}

window.signInGoogle = async ()=>{
  const btn = document.getElementById("google-btn");
  const err = document.getElementById("error-msg");
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> Signing in…';
  err.style.display="none";
  try{
    const result = await signInWithPopup(auth, gp);
    await ensureUserDoc(result.user);
    toast("Welcome, "+result.user.displayName+"!","success");
    setTimeout(()=>window.location.href=nextUrl, 800);
  }catch(e){
    btn.disabled=false;
    btn.innerHTML=`<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
    err.style.display="block";
    if(e.code==="auth/popup-closed-by-user") err.textContent="Sign-in cancelled.";
    else err.textContent="Sign-in failed: "+e.message;
  }
};
</script>
</body>
</html>
